<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YAMA · Tematik Yolculuklar</title>
<style>
:root{--bg:#0e1116;--card:#1b202a;--text:#f5efe4;--muted:#bbad97;--gold:#d0a047;--line:#2a303b}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;line-height:1.65}
.top{position:sticky;top:0;background:rgba(14,17,22,.94);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:13px 20px;display:flex;justify-content:space-between;gap:10px;z-index:5}
.top a{color:var(--gold);text-decoration:none;font-weight:700;letter-spacing:.08em}
main{max-width:1000px;margin:0 auto;padding:28px 20px 70px}
.eyebrow{color:var(--gold);letter-spacing:.24em;font-size:.74rem;text-transform:uppercase;margin:0 0 8px}
h1{font-size:1.9rem;margin:0 0 10px}
.desc{color:var(--muted);font-size:1.05rem;max-width:760px;margin:0 0 26px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:0 0 26px}
a.rc{display:block;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;color:inherit;text-decoration:none;transition:transform .2s,border-color .2s}
a.rc:hover{transform:translateY(-3px);border-color:var(--gold)}
a.rc h3{margin:0 0 4px;color:var(--gold);font-size:1.05rem}
a.rc span{color:var(--muted);font-size:.82rem}
.links{display:flex;flex-wrap:wrap;gap:10px}
.links a{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:10px 16px;color:var(--muted);text-decoration:none;font-size:.9rem}
.links a:hover{border-color:var(--gold);color:var(--gold)}
.other{margin-top:40px;border-top:1px solid var(--line);padding-top:18px}
.other h2{font-size:1rem;color:var(--muted);font-weight:400}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pills a{border:1px solid var(--line);border-radius:999px;padding:7px 13px;color:var(--muted);text-decoration:none;font-size:.82rem}
.pills a.on,.pills a:hover{border-color:var(--gold);color:var(--gold)}
@media(max-width:720px){.grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="top"><a href="index.html">← YAMA KÜLTÜR</a><a href="guide.html">Rehber →</a></div>
<main>
<p class="eyebrow">Tematik Yolculuk</p>
<h1 id="title"></h1>
<p class="desc" id="desc"></p>
<div class="grid" id="regions"></div>
<div class="links" id="links"></div>
<div class="other"><h2>Diğer temalar</h2><div class="pills" id="pills"></div></div>
</main>
<script>
const THEMES={
 antik:{t:'🏺 Antik Anadolu',d:'Hititlerden Likya\'ya, İyonya\'dan Kommagene\'ye: Anadolu, antik dünyanın en yoğun katmanlı coğrafyasıdır. Bu tema; tiyatrolar, tapınaklar, agoralar ve höyükler üzerinden MÖ binyılların izini sürer.',r:['efes','antalya','aydin','denizli','mugla','canakkale','izmir','burdur','mersin','corum'],
  l:[['Kültür Portalı — Ören Yerleri','https://www.kulturportali.gov.tr/'],['UNESCO Dünya Mirası','https://whc.unesco.org/en/statesparties/tr']]},
 osmanli:{t:'🕌 Osmanlı Dünyası',d:'Söğüt\'teki kuruluştan payitaht İstanbul\'a; külliyeler, hanlar, arastalar ve tarihî çarşılarla altı yüzyıllık bir medeniyetin şehir dokusu.',r:['istanbul','bursa','edirne','amasya','safranbolu','bilecik','tokat','kastamonu'],
  l:[['Millet Kütüphanesi','https://mk.gov.tr/'],['Topkapı Sarayı','https://muze.gen.tr/muze-detay/topkapi']]},
 bizans:{t:'🏰 Bizans',d:'Konstantinopolis\'in surlarından Kapadokya\'nın kaya kiliselerine, Trabzon Ayasofyası\'ndan Gümüşler Manastırı\'na: Doğu Roma\'nın bin yıllık Anadolu hafızası.',r:['istanbul','kapadokya','trabzon','bursa','efes','nigde','kirklareli'],
  l:[['Ayasofya','https://muze.gen.tr/'],['Bizans Anıtları (Kültür Portalı)','https://www.kulturportali.gov.tr/']]},
 akdeniz:{t:'🛶 Akdeniz',d:'Likya kıyılarından Kilikya\'ya: antik limanlar, deniz kaleleri, turkuaz koylar ve narenciye kokulu ovalar. Akdeniz, Anadolu\'nun güneye açılan yüzüdür.',r:['antalya','mersin','adana','hatay','osmaniye','mugla','burdur','isparta'],
  l:[['Mavi Yolculuk','https://tr.wikipedia.org/wiki/Mavi_Yolculuk']]},
 alman:{t:'🧭 Alman Seyyahları',d:'Moltke\'nin mektuplarından Schliemann\'ın Troya\'sına, Humann\'ın Bergama\'sından Wiegand\'ın Milet\'ine: 19. yüzyıl Alman gezgin ve arkeologlarının Anadolu güzergâhı. YAMA\'nın üç dilli yapısının tarihsel köklerinden biri.',r:['istanbul','canakkale','efes','izmir','konya'],
  l:[['Alman Arkeoloji Enstitüsü (DAI)','https://www.dainst.org/'],['Troya Müzesi','https://muze.gen.tr/muze-detay/troya']]},
 baharat:{t:'🧂 Baharat Yolu',d:'Antakya\'dan Gaziantep\'e, Mardin\'den tarihî çarşılara: kervanların taşıdığı tatlar, kokular ve mutfak kültürünün rotası. Gastronomi burada tarihin devamıdır.',r:['gaziantep','mardin','hatay','mersin','kayseri','diyarbakir'],
  l:[['Gaziantep Gastronomi (UNESCO)','https://tr.wikipedia.org/wiki/Gaziantep_mutfa%C4%9F%C4%B1']]},
 ipek:{t:'🐪 İpek Yolu',d:'Sultanhanı\'ndan Erzurum\'a Selçuklu kervansaray zinciri: Çin\'den Akdeniz\'e uzanan ticaretin Anadolu ayağı. Han, köprü ve pazar yerleriyle bir lojistik uygarlığı.',r:['aksaray','kayseri','konya','sivas','erzurum','kars','amasya'],
  l:[['Selçuklu Kervansarayları (UNESCO adayı)','https://whc.unesco.org/en/tentativelists/']]},
 liman:{t:'⚓ Liman Kentleri',d:'Sinop\'un doğal limanından İzmir\'in kordonuna, Trabzon\'dan Bodrum\'a: denizle kurulan şehirlerin ticaret, göç ve kültür alışverişi hikâyesi.',r:['izmir','sinop','trabzon','mersin','samsun','canakkale','istanbul','mugla'],
  l:[]},
 unesco:{t:'🏛 UNESCO',d:'Türkiye\'nin Dünya Mirası Listesi\'ndeki alanları: insanlığın ortak hafızasına kayıtlı 21 kültürel ve doğal varlık — Göbeklitepe\'den Divriği\'ye, Truva\'dan Ani\'ye.',r:['istanbul','efes','kapadokya','denizli','safranbolu','bursa','edirne','diyarbakir','gobeklitepe','sivas','kars','adiyaman','canakkale','corum'],
  l:[['UNESCO Türkiye Listesi','https://whc.unesco.org/en/statesparties/tr'],['UNESCO Türkiye Millî Komisyonu','https://www.unesco.org.tr/']]},
 seyahatname:{t:'📜 Seyahatnameler',d:'Evliya Çelebi\'nin on ciltlik Seyahatnâme\'sinden Busbecq\'in Türk Mektupları\'na, İbn Battuta\'dan Dernschwam\'a: Anadolu\'yu gezginlerin gözünden okumak.',r:['istanbul','kutahya','bursa'],
  l:[['Evliya Çelebi Seyahatnâmesi','https://tr.wikipedia.org/wiki/Seyahatn%C3%A2me'],['Busbecq — Türk Mektupları','https://tr.wikipedia.org/wiki/Ogier_Ghiselin_de_Busbecq'],['İbn Battuta','https://tr.wikipedia.org/wiki/%C4%B0bn_Battuta']]},
 harita:{t:'🗺 Eski Haritalar',d:'Piri Reis\'in Kitab-ı Bahriye\'sinden Kâtip Çelebi\'nin Cihannümâ\'sına ve 19. yüzyıl Avrupa atlaslarına: Anadolu\'nun kartografik hafızası.',r:['istanbul'],
  l:[['Piri Reis Haritası','https://tr.wikipedia.org/wiki/Pir%C3%AE_Reis_haritas%C4%B1'],['Kitab-ı Bahriye','https://tr.wikipedia.org/wiki/Kitab-%C4%B1_Bahriye'],['David Rumsey Harita Koleksiyonu','https://www.davidrumsey.com/'],['Cihannümâ','https://tr.wikipedia.org/wiki/Cihann%C3%BCm%C3%A2']]},
 akademik:{t:'🎓 Akademik Okumalar',d:'YAMA\'nın kaynak standardı: hakemli makaleler, tezler ve kurumsal yayınlar. Rehberdeki her anlatının arkasında bu havuz vardır.',r:[],
  l:[['DergiPark','https://dergipark.org.tr/'],['YÖK Ulusal Tez Merkezi','https://tez.yok.gov.tr/'],['Türk Tarih Kurumu','https://www.ttk.gov.tr/'],['Belleten','https://belleten.gov.tr/'],['TAY Projesi (Arkeolojik Yerleşmeler)','http://www.tayproject.org/']]}
};
const params=new URLSearchParams(location.search);
let key=params.get('t')||'antik'; if(!THEMES[key])key='antik';
const T=THEMES[key];
document.title='YAMA · '+T.t.replace(/^[^ ]+ /,'');
document.getElementById('title').textContent=T.t;
document.getElementById('desc').textContent=T.d;
fetch('places.json').then(r=>r.json()).then(d=>{
  const regs={}; d.regions.forEach(r=>regs[r.id]=r);
  document.getElementById('regions').innerHTML=T.r.map(id=>{
    const r=regs[id]; if(!r)return '';
    return `<a class="rc" href="guide.html?region=${id}"><h3>${r.name.tr}</h3><span>${r.places.length} nokta · ${r.geo||''}</span></a>`;
  }).join('');
});
document.getElementById('links').innerHTML=T.l.map(x=>`<a target="_blank" rel="noopener" href="${x[1]}">🔗 ${x[0]}</a>`).join('');
document.getElementById('pills').innerHTML=Object.entries(THEMES).map(([k,v])=>`<a class="${k===key?'on':''}" href="tema.html?t=${k}">${v.t}</a>`).join('');
</script>
</body>
</html>
