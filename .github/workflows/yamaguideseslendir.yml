name: YAMA Guide Seslendirme

# guide.html (places.json) noktalarını Ergun'un klon sesiyle mp3'e çevirir.
# İki şekilde çalışır:
#   - Actions sekmesinden "Run workflow" ile elle (workflow_dispatch)
#   - places.json her değiştiğinde otomatik
#
# GEREKEN (yalnızca bir kez):
#   Settings > Secrets and variables > Actions > Secrets:  ELEVENLABS_API_KEY
#   (Voice ID betiğin içinde gömülü; değiştirmek istersen Variables > ELEVENLABS_VOICE_ID ekle.)

on:
  workflow_dispatch:
    inputs:
      langs:
        description: 'Seslendirilecek diller (virgülle): tr veya tr,de,en'
        required: false
        default: 'tr'
      force:
        description: 'Var olan mp3leri de baştan üret (1 = evet)'
        required: false
        default: '0'
  push:
    paths:
      - 'places.json'

permissions:
  contents: write

jobs:
  seslendir:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Yükle
        run: pip install requests

      - name: Sesleri Üret
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ vars.ELEVENLABS_VOICE_ID }}
          YAMA_LANGS: ${{ github.event.inputs.langs || 'tr' }}
          YAMA_FORCE: ${{ github.event.inputs.force || '0' }}
        run: python scripts/seslendir_guide.py

      - name: Sesleri Repoya Geri Yükle
        run: |
          git config --global user.name "YAMA AI Bot"
          git config --global user.email "bot@yamaguide.com"
          git add sesler/*.mp3 sesler/manifest.json || true
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "🔊 guide.html sesleri (klon ses) güncellendi" && git push)
