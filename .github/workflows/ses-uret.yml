name: Otomatik Yapay Zeka Seslendirici

on:
  push:
    paths:
      - 'rehber/**/*.md'

permissions:
  contents: write

jobs:
  seslendir:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          pip install requests

      - name: ElevenLabs ile Sesi Üret
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          python - << 'EOF'
          import os
          import json
          import requests
          import subprocess

          try:
              changed_files = subprocess.check_output(['git', 'diff', '--name-only', 'HEAD~1', 'HEAD']).decode('utf-8').splitlines()
          except Exception:
              changed_files = subprocess.check_output(['git', 'diff', '--name-only', 'HEAD']).decode('utf-8').splitlines()
              
          md_files = [f for f in changed_files if f.startswith('rehber/') and f.endswith('.md')]

          if not md_files:
              print("Değişen rehber dosyası bulunamadı.")
              exit(0)

          api_key = os.environ.get("ELEVENLABS_API_KEY")
          if not api_key:
              print("HATA NEDENİ: ELEVENLABS_API_KEY bulunamadı! GitHub Settings > Secrets alanını kontrol edin.")
              exit(1)

          voice_id = "21m00Tcm4TlvDq8ikWAM" 
          url = f"https://elevenlabs.io{voice_id}"

          headers = {
              "Accept": "audio/mpeg",
              "Content-Type": "application/json",
              "xi-api-key": api_key
          }

          for file_path in md_files:
              if not os.path.exists(file_path):
                  continue
              with open(file_path, 'r', encoding='utf-8') as f:
                  lines = f.readlines()
              
              text_to_speak = ""
              capture = False
              for line in lines:
                  if "Express Guide" in line:
                      capture = True
                      continue
                  if capture and "YAMA Motto" in line:
                      capture = False
                      break
                  if capture:
                      text_to_speak += line.strip() + " "

              if not text_to_speak.strip():
                  print(f"HATA NEDENİ: {file_path} içinde 'Express Guide' ve 'YAMA Motto' arasında seslendirilecek metin bulunamadı!")
                  continue

              print(f"{file_path} için ses üretiliyor... Metin boyutu: {len(text_to_speak)} karakter.")
              
              data = {
                  "text": text_to_speak,
                  "model_id": "eleven_multilingual_v2",
                  "voice_settings": {
                      "stability": 0.5,
                      "similarity_boost": 0.75
                  }
              }

              response = requests.post(url, json=data, headers=headers)
              if response.status_code == 200:
                  mp3_path = file_path.replace('.md', '.mp3')
                  with open(mp3_path, 'wb') as audio_out:
                      audio_out.write(response.content)
                  print(f"Başarılı: {mp3_path} oluşturuldu.")
              else:
                  print(f"HATA NEDENİ: ElevenLabs API hata döndürdü. Kodu: {response.status_code} - Mesaj: {response.text}")
                  exit(1)

          EOF

      - name: Ses Dosyasını Repoya Geri Yükle
        run: |
          git config --global user.name "YAMA AI Bot"
          git config --global user.email "bot@yamaguide.com"
          git add rehber/**/*.mp3
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Otomatik ses dosyası yapay zeka tarafından eklendi" && git push)
