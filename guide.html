<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YAMA Rehber · Digital Tour Guide</title>
<meta name="description" content="YAMA Kültür dijital rehber: Türkiye'nin turistik noktaları — üç dilli kısa anlatımlar ve sesli rehber." />
<style>
:root{--bg:#0e1116;--bg2:#141820;--card:#1b202a;--text:#f5efe4;--muted:#bbad97;--gold:#d0a047;--line:#2a303b}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;line-height:1.6}
.top{position:sticky;top:0;background:rgba(14,17,22,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;z-index:5}
.top a.logo{color:var(--gold);text-decoration:none;font-weight:700;letter-spacing:.08em}
.top a.maplink{color:var(--muted);text-decoration:none;font-size:.85rem;border:1px solid var(--line);border-radius:999px;padding:5px 12px}
.top a.maplink:hover{color:var(--gold);border-color:var(--gold)}
.top-right{display:flex;align-items:center;gap:10px}
.langs{display:flex;gap:6px}
.langs button{font:inherit;font-size:.8rem;padding:5px 12px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--muted);cursor:pointer}
.langs button.active{background:var(--gold);color:#14100a;border-color:var(--gold)}
.music-btn{font:inherit;font-size:.9rem;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--gold);cursor:pointer;line-height:1}
.music-btn.off{color:var(--muted);opacity:.6}
main{max-width:960px;margin:0 auto;padding:28px 20px 60px}
h1{font-size:1.6rem;margin:10px 0 4px}
.lead{color:var(--muted);margin:0 0 22px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 24px}
.tabs button{font:inherit;padding:9px 16px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--text);cursor:pointer}
.tabs button.active{border-color:var(--gold);color:var(--gold)}
.region-hero{height:150px;border-radius:14px;background-size:cover;background-position:center;border:1px solid var(--line);margin-bottom:20px}
.place{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.place h3{margin:0 0 8px;color:var(--gold);font-size:1.12rem}
.place p{margin:0 0 12px}
.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.actions a,.actions button{font:inherit;font-size:.82rem;padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:var(--bg2);color:var(--muted);cursor:pointer;text-decoration:none}
.actions .speak.on{border-color:var(--gold);color:var(--gold)}
.actions .speak.voice{border-color:var(--gold);color:var(--gold)}
.badge-voice{font-size:.7rem;color:var(--gold);opacity:.8;letter-spacing:.04em}
.note{color:var(--muted);font-size:.82rem;margin-top:30px;border-top:1px solid var(--line);padding-top:14px}
.tabs.geo button{font-size:.8rem;padding:7px 14px;display:flex;align-items:center;gap:7px}
.tabs.geo button::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--gc,#888)}
.mapbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px;margin:0 0 18px}
.map-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:2px 6px 8px}
.map-head .cap{color:var(--muted);font-size:.85rem}
.map-head .cap b{color:var(--gold)}
.map-head .mh-btns{display:flex;gap:8px}
.map-head button{font:inherit;font-size:.78rem;padding:6px 13px;border-radius:999px;border:1px solid var(--line);background:var(--bg2);color:var(--muted);cursor:pointer}
.map-head button:hover{border-color:var(--gold);color:var(--gold)}
.map-head button.addall.done{border-color:var(--gold);color:var(--gold)}
.mapbox svg{width:100%;height:auto;display:block}
.mapbox .il{stroke:#0e1116;stroke-width:1;cursor:pointer;transition:filter .15s}
.mapbox .il:hover{filter:brightness(1.35)}
.mapbox .il.sel{stroke:var(--gold);stroke-width:2.4;filter:brightness(1.25)}
.mapbox.closed #mapSvgWrap{display:none}

.actions .add{border-color:var(--line);color:var(--muted)}
.actions .add.in{border-color:var(--gold);background:rgba(208,160,71,.14);color:var(--gold)}
.tourbar{position:fixed;left:0;right:0;bottom:0;transform:translateY(120%);transition:transform .28s ease;background:rgba(20,24,32,.97);backdrop-filter:blur(8px);border-top:1px solid var(--gold);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;z-index:20}
.tourbar.show{transform:translateY(0)}
.tourbar .info{color:var(--text);font-size:.92rem}
.tourbar .info b{color:var(--gold)}
.tourbar .tb-actions{display:flex;gap:8px;flex-wrap:wrap}
.tourbar button{font:inherit;font-size:.85rem;padding:8px 16px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--text);cursor:pointer}
.tourbar button.primary{background:var(--gold);color:#14100a;border-color:var(--gold);font-weight:700}
.tourbar button.ghost{color:var(--muted)}
</style>
</head>

const VOL_NORMAL=0.16, VOL_DUCK=0.045;     // müzik: normal / anlatım sırasında kısık

let DATA=null, lang='tr', region=null, speakingBtn=null, VOICES=[];
const GEO_ORDER=['Marmara','Ege','Akdeniz','İç Anadolu','Karadeniz','Doğu Anadolu','Güneydoğu Anadolu'];
const GEO_COLOR={'Marmara':'#4a7ab5','Ege':'#2e9e8f','Akdeniz':'#3a8fc0','İç Anadolu':'#d0a047','Karadeniz':'#4aa96c','Doğu Anadolu':'#c07a4a','Güneydoğu Anadolu':'#b5654a'};
let geoSel=null;
function geoOf(rid){const r=DATA.regions.find(x=>x.id===rid);return r?(r.geo||''):'';}
let MANIFEST=new Set(), currentAudio=null;
let musicEnabled=true, bgmStarted=false, currentMusicSrc='', rampTimer=null;

const bgm=document.getElementById('bgm');
const musicBtn=document.getElementById('musicBtn');

function loadVoices(){VOICES=speechSynthesis.getVoices()||[];}
loadVoices();
if(typeof speechSynthesis!=='undefined') speechSynthesis.onvoiceschanged=loadVoices;
function pickVoice(bcp){
  const base=bcp.split('-')[0];
  const cand=VOICES.filter(v=>v.lang&&v.lang.toLowerCase().startsWith(base));
  return cand.find(v=>/natural|neural|premium|enhanced|google/i.test(v.name)) || cand[0] || null;
}

Promise.resolve()
  .then(()=>fetch(AUDIO_DIR+'manifest.json').then(r=>r.ok?r.json():[]).catch(()=>[]))
  .then(list=>{ if(Array.isArray(list)) MANIFEST=new Set(list); })
  .then(()=>fetch('places.json').then(r=>r.json()))
  .then(d=>{
    DATA=d;
    const params=new URLSearchParams(location.search);
    const wanted=(params.get('region')||location.hash.replace('#','')).toLowerCase();
    const match=d.regions.find(r=>r.id===wanted);
    region = match ? match.id : d.regions[0].id;
    geoSel=geoOf(region)||GEO_ORDER[0];
    render();
  });

function t(k){return UI[lang][k];}
function keyFor(placeId){return region+'-'+placeId+'-'+lang;}
function hasVoice(placeId){return MANIFEST.has(keyFor(placeId));}

/* ---------- MÜZİK: sürekli + ducking ---------- */
function musicForRegion(r){return MUSIC[r]||MUSIC_FALLBACK;}
function rampVolume(target,dur){
  if(rampTimer) clearInterval(rampTimer);
  const start=bgm.volume, steps=Math.max(1,Math.round(dur/40));
  let i=0;
  rampTimer=setInterval(()=>{
    i++; bgm.volume=Math.max(0,Math.min(1,start+(target-start)*i/steps));
    if(i>=steps){clearInterval(rampTimer);rampTimer=null;}
  },40);
}
function ensureMusic(){
  if(!musicEnabled||bgmStarted) return;
  const src=musicForRegion(region);
  bgm.src=src; currentMusicSrc=src; bgm.loop=true; bgm.volume=0;
  const p=bgm.play();
  if(p&&p.then){p.then(()=>{bgmStarted=true;rampVolume(VOL_NORMAL,800);}).catch(()=>{});}
  bgmStarted=true;
}
function switchMusic(){
  if(!musicEnabled||!bgmStarted) return;
  const src=musicForRegion(region);
  if(src===currentMusicSrc) return;
  rampVolume(0,300);
  setTimeout(()=>{
    bgm.src=src; currentMusicSrc=src; bgm.loop=true;
    const p=bgm.play(); if(p&&p.catch)p.catch(()=>{});
    rampVolume(speakingBtn?VOL_DUCK:VOL_NORMAL,600);
  },320);
}
function duck(){ if(musicEnabled&&bgmStarted) rampVolume(VOL_DUCK,220); }
function unduck(){ if(musicEnabled&&bgmStarted) rampVolume(VOL_NORMAL,600); }
function toggleMusic(){
  musicEnabled=!musicEnabled;
  musicBtn.classList.toggle('off',!musicEnabled);
  if(musicEnabled){ bgmStarted=false; ensureMusic(); }
  else { rampVolume(0,300); setTimeout(()=>{try{bgm.pause();}catch(e){}},320); bgmStarted=false; }
}
musicBtn.onclick=toggleMusic;

/* ---------- RENDER ---------- */
function render(){
  document.getElementById('title').textContent=t('title');
  document.getElementById('lead').textContent=t('lead');
  document.getElementById('note').textContent=t('note');
  document.documentElement.lang=lang;
  document.querySelectorAll('.langs button').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  const gt=document.getElementById('geotabs');
  gt.innerHTML=GEO_ORDER.filter(gx=>DATA.regions.some(r=>r.geo===gx)).map(gx=>`<button data-g="${gx}" style="--gc:${GEO_COLOR[gx]}" class="${gx===geoSel?'active':''}">${gx}</button>`).join('');
  gt.querySelectorAll('button').forEach(b=>b.onclick=()=>{stopSpeak();geoSel=b.dataset.g;const first=DATA.regions.find(r=>r.geo===geoSel);if(first&&geoOf(region)!==geoSel)region=first.id;render();ensureMusic();switchMusic();});
  const tabs=document.getElementById('tabs');
  tabs.innerHTML=DATA.regions.filter(r=>r.geo===geoSel).map(r=>`<button data-r="${r.id}" class="${r.id===region?'active':''}">${r.name[lang]}</button>`).join('');
  tabs.querySelectorAll('button').forEach(b=>b.onclick=()=>{stopSpeak();region=b.dataset.r;render();ensureMusic();switchMusic();});
  const reg=DATA.regions.find(r=>r.id===region);
  const hero=document.getElementById('hero');
  if(reg.img){hero.style.display='block';hero.style.backgroundImage=`url('${reg.img}')`;}else{hero.style.display='none';}
  document.getElementById('places').innerHTML=reg.places.map(p=>{
    const voiced=hasVoice(p.id);
    return `
    <article class="place">
      <h3>${p.name[lang]}</h3>
      <p>${p.desc[lang]}</p>
      <div class="actions">
        <button class="speak${voiced?' voice':''}" data-place="${p.id}" data-text="${encodeURIComponent(p.name[lang]+'. '+p.desc[lang])}">${t('listen')}</button>
        ${voiced?`<span class="badge-voice">✦ ${t('voice')}</span>`:''}
        <a target="_blank" rel="noopener" href="https://www.openstreetmap.org/?mlat=${p.coords[0]}&mlon=${p.coords[1]}#map=16/${p.coords[0]}/${p.coords[1]}">${t('map')}</a>
        <button class="add${tourHas(region,p.id)?' in':''}" data-place="${p.id}">${tourHas(region,p.id)?t('added'):t('add')}</button>
      </div>
    </article>`;}).join('');
  document.querySelectorAll('.speak').forEach(b=>b.onclick=()=>toggleSpeak(b));
  document.querySelectorAll('.add').forEach(b=>b.onclick=()=>{tourToggle(region,b.dataset.place);render();updateTourBar();});
  updateTourBar();
  updateMap();
}

/* ---------- ANLATIM ---------- */
function stopSpeak(){
  try{speechSynthesis.cancel();}catch(e){}
  if(currentAudio){try{currentAudio.pause();}catch(e){}currentAudio=null;}
  if(speakingBtn){speakingBtn.classList.remove('on');speakingBtn.textContent=t('listen');speakingBtn=null;}
  unduck();               // müzik durmaz, sadece seviyesi geri yükselir (sürekli çalar)
}
function toggleSpeak(btn){
  if(speakingBtn===btn){stopSpeak();return;}
  stopSpeak();
  speakingBtn=btn; btn.classList.add('on'); btn.textContent=t('stop');
  ensureMusic(); duck();
  if(hasVoice(btn.dataset.place)) playClip(btn); else speakTTS(btn);
}
function playClip(btn){
  const url=AUDIO_DIR+keyFor(btn.dataset.place)+'.mp3';
  const a=new Audio(url); currentAudio=a;
  a.onended=()=>{if(speakingBtn===btn)stopSpeak();};
  a.onerror=()=>{currentAudio=null; if(speakingBtn===btn) speakTTS(btn);};
  const p=a.play(); if(p&&p.catch)p.catch(()=>{});
}
function speakTTS(btn){
  const u=new SpeechSynthesisUtterance(decodeURIComponent(btn.dataset.text));
  u.lang=SPEECH_LANG[lang];
  const v=pickVoice(u.lang); if(v) u.voice=v;
  u.rate=0.82; u.pitch=1;
  u.onend=()=>{if(speakingBtn===btn)stopSpeak();};
  u.onerror=()=>{if(speakingBtn===btn)stopSpeak();};
  try{speechSynthesis.speak(u);}catch(e){stopSpeak();}
}
/* ---------- TUR SEPETİ (localStorage) ---------- */
const TOUR_KEY='yamaTour';
function tourGet(){try{const a=JSON.parse(localStorage.getItem(TOUR_KEY)||'[]');return Array.isArray(a)?a:[];}catch(e){return [];}}
function tourSave(a){try{localStorage.setItem(TOUR_KEY,JSON.stringify(a));}catch(e){}}
function tourHas(r,p){return tourGet().some(x=>x.r===r&&x.p===p);}
function tourToggle(r,p){
  const a=tourGet(); const i=a.findIndex(x=>x.r===r&&x.p===p);
  if(i>=0)a.splice(i,1); else a.push({r,p});
  tourSave(a);
}
function tourCount(){return tourGet().length;}
function updateTourBar(){
  const bar=document.getElementById('tourbar'); const n=tourCount();
  document.getElementById('tbInfo').innerHTML=t('tbInfo')(n);
  document.getElementById('tbBuild').textContent=t('tbBuild');
  document.getElementById('tbClear').textContent=t('tbClear');
  bar.classList.toggle('show',n>0);
}
document.getElementById('tbClear').onclick=()=>{tourSave([]);render();updateTourBar();};
document.getElementById('tbBuild').onclick=()=>{location.href='tur.html?lang='+lang;};


/* ---------- HARİTA ---------- */
const mapToggleBtn=document.getElementById('mapToggle');
mapToggleBtn.onclick=()=>{
  const mb=document.getElementById('mapbox');
  mb.classList.toggle('closed');
  mapToggleBtn.textContent=mb.classList.contains('closed')?t('mapShow'):t('mapHide');
};
document.querySelectorAll('.mapbox .il').forEach(p=>{
  p.addEventListener('click',()=>{
    stopSpeak(); region=p.dataset.r; geoSel=geoOf(region)||geoSel;
    render(); ensureMusic(); switchMusic();
    document.getElementById('places').scrollIntoView({behavior:'smooth'});
  });
});
function ilAllInTour(reg){return reg.places.every(p=>tourHas(reg.id,p.id));}
function updateMap(){
  if(!DATA) return;
  document.querySelectorAll('.mapbox .il').forEach(p=>p.classList.toggle('sel',p.dataset.r===region));
  const reg=DATA.regions.find(r=>r.id===region);
  const selPath=document.querySelector('.mapbox .il.sel');
  const ilName=selPath?selPath.dataset.il:reg.name[lang];
  document.getElementById('mapCap').innerHTML='<b>'+ilName+'</b> · '+(reg.geo||'')+' · '+reg.places.length+' '+t('pts');
  const btn=document.getElementById('addIl');
  const done=ilAllInTour(reg);
  btn.textContent=done?t('allIn'):t('addAll');
  btn.classList.toggle('done',done);
  btn.onclick=()=>{
    if(ilAllInTour(reg)){reg.places.forEach(p=>{if(tourHas(reg.id,p.id))tourToggle(reg.id,p.id);});}
    else{reg.places.forEach(p=>{if(!tourHas(reg.id,p.id))tourToggle(reg.id,p.id);});}
    render();updateTourBar();
  };
  mapToggleBtn.textContent=document.getElementById('mapbox').classList.contains('closed')?t('mapShow'):t('mapHide');
}

document.querySelectorAll('.langs button').forEach(b=>b.onclick=()=>{stopSpeak();lang=b.dataset.lang;render();updateTourBar();});
</script>
</body>
</html>
